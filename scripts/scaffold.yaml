services:
  cubejs:
    image: cubejs/cube
    restart: always
    ports:
      - "4000:4000"
      - "3001:3000"
    volumes:
      - "../services/libs/cubejs:/cube/conf"
    environment:
      - CUBEJS_DEV_MODE=true
      - CUBEJS_DB_HOST=db
      - CUBEJS_DB_PORT=5432
      - CUBEJS_DB_NAME=gitmesh-web
      - CUBEJS_DB_USER=postgres
      - CUBEJS_DB_PASS=example
      - CUBEJS_DB_TYPE=postgres
      - CUBEJS_API_SECRET=137ea167812145c6d77452a58d7dd29b
      - CUBEJS_EXTERNAL_DEFAULT=true
      - CUBEJS_SCHEDULED_REFRESH_DEFAULT=true
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4000/readyz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gitmesh-bridge

  db:
    image: postgres:13.6-alpine
    restart: always
    environment:
      - POSTGRES_PASSWORD=example
      - POSTGRES_DB=gitmesh-web
    ports:
      - 5432:5432
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - gitmesh-bridge

  sqs:
    build:
      context: scaffold/sqs
    restart: always
    ports:
      - 9324:9324
      - 9325:9325
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9325 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gitmesh-bridge

  nginx:
    image: nginx:1.24-alpine
    restart: always
    volumes:
      - ./scaffold/nginx/templates:/etc/nginx/templates
      - ./scaffold/nginx/ssl:/etc/nginx/ssl
    ports:
      - "443:443"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=443
    networks:
      - gitmesh-bridge

  redis:
    build:
      context: scaffold/redis
    command: "redis-server /redis.conf --requirepass gitmeshtest"
    restart: always
    volumes:
      - redis-dev:/data
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "gitmeshtest", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - gitmesh-bridge

  nango:
    image: nangohq/nango-server:0.9.0
    restart: always
    environment:
      - NANGO_DB_HOST=db
      - NANGO_DB_PORT=5432
      - NANGO_DB_NAME=gitmesh-web
      - NANGO_DB_USER=postgres
      - NANGO_DB_PASSWORD=example
      - NANGO_SECRET_KEY=424242
      - NANGO_CALLBACK_URL=http://localhost:3003/oauth/callback
      - NANGO_SERVER_URL=http://localhost:3003
      - SERVER_PORT=3003
    ports:
      - "3003:3003"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3003/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gitmesh-bridge

  temporal:
    build:
      context: scaffold/temporal
    restart: always
    ports:
      - "7233:7233"
      - "8233:8233"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gitmesh-bridge

networks:
  gitmesh-bridge:
    external: true

volumes:
  pgdata-dev:
  s3-dev:
  redis-dev:
