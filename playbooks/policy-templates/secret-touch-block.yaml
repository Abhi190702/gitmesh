metadata:
  slug: secret-touch-block
  title: Block touching secret-pattern files
  whatItDoes: Blocks agents from reading or writing files that look like secrets — `.env`, `*.key`, `*.pem`, `secrets/`.
  whatItProtects: Anything you didn't mean to commit. Even read access by an agent puts secrets in token logs.
  whenToUse: Always. Secrets should be referenced by name (the secrets store), not read from disk by agents.
  auditExample: |
    Agent "docs-bot" attempted file_read on .env.production
    → blocked by policy `_starter_secret-touch-block` v1
    → audit row 8a72... attests block decision
  videoUrl: null
  defaultEnabled: true
policy:
  name: _starter_secret-touch-block
  description: Block agent file_edit and file_read on secret-pattern paths
  actionPattern:
    - "file_edit"
    - "file_read"
  conditions:
    pathGlob:
      - ".env"
      - ".env.*"
      - "*.key"
      - "*.pem"
      - "secrets/**"
      - ".secrets/**"
      - "*.p12"
      - "*.pfx"
      - "id_rsa"
      - "id_ed25519"
  effect: block
  effectConfig:
    message: "This file matches a secret pattern. Reference secrets through the GitMesh secret store instead."
  priority: 8
