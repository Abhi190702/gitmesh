metadata:
  slug: external-fork-warning
  title: External-fork PR review gate
  whatItDoes: Flags PR reviews from forks for extra scrutiny — escalates to a human before any agent acts.
  whatItProtects: Your project from drive-by forks that may include subtle malicious changes.
  whenToUse: When you accept PRs from forks (most public projects). Pair with `no-merge-without-approval`.
  auditExample: |
    Agent "pr-review-bot" attempted pr_review on PR #482 from fork user/repo
    → require_approval by policy `_starter_external-fork-warning` v1
    → reviewer pinged with extra-scrutiny tier
  videoUrl: null
  defaultEnabled: false
policy:
  name: _starter_external-fork-warning
  description: PR reviews from forks require extra-scrutiny human approval
  actionPattern: pr_review
  conditions:
    fromFork:
      - "true"
  effect: require_approval
  effectConfig:
    approverRoles: ["maintainer", "admin"]
    reviewerTier: "extra-scrutiny"
    timeout: "72h"
  priority: 35
