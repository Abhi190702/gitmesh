services:
  gitmesh-agents:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GITMESH_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      GITMESH_HOME: "/gitmesh-agents"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GITMESH_DEPLOYMENT_MODE: "authenticated"
      GITMESH_DEPLOYMENT_EXPOSURE: "private"
      GITMESH_PUBLIC_URL: "${GITMESH_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-change-me-to-random-32-char-string}"
    volumes:
      - "${GITMESH_DATA_DIR:-./data/docker-gitmesh-agents}:/gitmesh-agents"
