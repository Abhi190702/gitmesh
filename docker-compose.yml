services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: gitmesh
      POSTGRES_PASSWORD: gitmesh
      POSTGRES_DB: gitmesh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitmesh -d gitmesh"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://gitmesh:gitmesh@db:5432/gitmesh-agents
      PORT: "3100"
      SERVE_UI: "true"
      GITMESH_DEPLOYMENT_MODE: "authenticated"
      GITMESH_DEPLOYMENT_EXPOSURE: "private"
      GITMESH_PUBLIC_URL: "${GITMESH_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - gitmesh-data:/gitmesh-agents
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  gitmesh-data:
